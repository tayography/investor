<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; font-family: 'Manrope', sans-serif; }

  body.is-dark { background: #0c0e12; color: #e2e2e8; }
  body.is-light { background: #e8e8ef; color: #1a1c20; }

  #chrome { height: 100vh; display: flex; flex-direction: column; }

  /* ── Tab bar ── */
  #tabbar {
    display: flex;
    align-items: stretch;
    overflow-x: auto;
    flex-shrink: 0;
    transition: background .25s, border-color .25s;
  }
  #tabbar::-webkit-scrollbar { height: 2px; }
  body.is-dark #tabbar { background: #111317; border-bottom: 1px solid #2a2d33; }
  body.is-dark #tabbar::-webkit-scrollbar-thumb { background: #45474c; }
  body.is-light #tabbar { background: #ffffff; border-bottom: 1px solid #dde0e8; }
  body.is-light #tabbar::-webkit-scrollbar-thumb { background: #c5c5d0; }

  .tab-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    font-family: 'Manrope', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .12em;
    margin-bottom: -1px;
    padding: 13px 18px;
    text-transform: uppercase;
    transition: color .15s, border-color .15s;
    white-space: nowrap;
  }
  body.is-dark .tab-btn { color: #6b7280; }
  body.is-dark .tab-btn:hover { color: #c5c6cc; }
  body.is-dark .tab-btn.active { border-bottom-color: #e9c176; color: #e9c176; }
  body.is-light .tab-btn { color: #9ca3af; }
  body.is-light .tab-btn:hover { color: #374151; }
  body.is-light .tab-btn.active { border-bottom-color: #b8922a; color: #b8922a; }

  /* ── Info / control bar ── */
  #infobar {
    display: flex;
    align-items: center;
    padding: 6px 18px;
    gap: 12px;
    flex-shrink: 0;
    transition: background .25s, border-color .25s;
  }
  body.is-dark #infobar { background: #1a1c20; border-bottom: 1px solid #1e2024; }
  body.is-light #infobar { background: #f4f4f6; border-bottom: 1px solid #dde0e8; }

  #infobar .label { font-size: 9px; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; }
  body.is-dark #infobar .label { color: #45474c; }
  body.is-light #infobar .label { color: #9ca3af; }

  #current-label { font-size: 9px; font-weight: 800; letter-spacing: .15em; text-transform: uppercase; }
  body.is-dark #current-label { color: #e9c176; }
  body.is-light #current-label { color: #b8922a; }

  #counter { margin-left: auto; font-size: 9px; font-weight: 700; letter-spacing: .1em; }
  body.is-dark #counter { color: #333539; }
  body.is-light #counter { color: #9ca3af; }

  /* ── Mode toggle ── */
  #mode-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid;
    cursor: pointer;
    font-family: 'Manrope', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    transition: all .2s;
    flex-shrink: 0;
  }
  body.is-dark #mode-toggle {
    background: #282a2e;
    border-color: #45474c;
    color: #c5c6cc;
  }
  body.is-dark #mode-toggle:hover { background: #333539; color: #e2e2e8; }
  body.is-light #mode-toggle {
    background: #ffffff;
    border-color: #d1d5db;
    color: #374151;
  }
  body.is-light #mode-toggle:hover { background: #f0f0f4; }

  .toggle-icon { font-size: 13px; line-height: 1; }

  /* ── Frames ── */
  #frames { flex: 1; position: relative; overflow: hidden; }
  .pane { position: absolute; inset: 0; width: 100%; height: 100%; border: none; display: none; }
  .pane.active { display: block; }
</style>
</head>
